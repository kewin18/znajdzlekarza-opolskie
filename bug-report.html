<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zgłoś błąd - ZnajdźLekarza Opolskie</title>
<meta name="robots" content="index,follow">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
<main class="max-w-3xl mx-auto p-4 sm:p-6">
  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-5 sm:p-7">
    <h1 class="text-2xl sm:text-3xl font-bold mb-2">Zgłoś błąd</h1>
    <p class="text-sm text-slate-600 mb-5">
      Wypełnij krótki formularz. Zgłoszenie trafi na adres:
      <b>znajdzlekarzaopolskie@gmail.com</b>.
    </p>

    <form action="https://formsubmit.co/znajdzlekarzaopolskie@gmail.com" method="POST" class="space-y-4">
      <input type="hidden" name="_subject" value="Nowe zgłoszenie błędu - ZnajdźLekarza Opolskie">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://kewin18.github.io/znajdzlekarza-opolskie/bug-report-thanks.html">

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Miasto / placówka (opcjonalnie)</label>
        <input name="Miasto_lub_placowka" class="w-full h-11 px-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400" placeholder="np. Opole - Opolskie Centrum Medyczne">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Co jest nie tak? *</label>
        <textarea name="Opis_bledu" required rows="6" class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400" placeholder="np. zły numer telefonu, zła lokalizacja, brakująca specjalizacja..."></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Twój e-mail (opcjonalnie)</label>
        <input type="email" name="Email_kontaktowy" class="w-full h-11 px-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400" placeholder="jeśli chcesz odpowiedź">
      </div>

      <div class="flex flex-col sm:flex-row gap-2 sm:justify-between">
        <a href="index.html" class="h-11 inline-flex items-center justify-center px-4 rounded-lg border border-slate-300 text-slate-700 font-medium hover:bg-slate-50">
          Wróć
        </a>
        <button type="submit" class="h-11 px-5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700">
          Wyślij zgłoszenie
        </button>
      </div>
    </form>
  </div>
</main>
</body>
</html>
